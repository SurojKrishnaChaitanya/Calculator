<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR</title>
    <link rel="stylesheet" href="CalculatorStyling.css">
</head>
<body>
    <div id="calculator-container">
        <div id="calculator">
            <div id="operation-section">
                <p id="display-section"></p>8
            </div>
            <div id="button-section">
                <div id="digit-section">
                    <button id="b1">1</button>
                    <button id="b2">2</button>
                    <button id="b3">3</button>
                    <button id="b4">4</button>
                    <button id="b5">5</button>
                    <button id="b6">6</button>
                    <button id="b7">7</button>
                    <button id="b8">8</button>
                    <button id="b9">9</button>
                    <button id="b0">0</button>
                    <button id="bPi">PI</button>
                    <button id="bE">e</button>
                    <button id="equate-btn">Calculate</button>
                </div>
                <div id="operator-section">
                    <button id="add-btn">+</button>
                    <button id="subtract-btn">-</button>
                    <button id="multiply-btn">X</button>
                    <button id="divide-btn">/</button>
                    <button id="exponentialize-btn">^</button>
                    <button id="clear-btn">C</button>
                </div>
            </div>
        </div>
    </div>
    <script src = "Calculator.js"></script>
</body>
</html>
